      height: 70px;
      padding: 0;
      box-sizing: border-box;
      background: transparent;
      gap: 8px;

    iframe {
      border: 0;
      background: transparent;
      overflow: hidden;
      display: block;
      height: 70px;
      min-height: 70px;
      max-height: 70px;
      flex: 0 0 auto;
    }

    #time {
      width: 160px;
      flex: 0 0 160px;

    #date {

      flex: 0 0 210px;
    }

    #location {
      min-width: 400px;
      width: auto;
      flex: 0 1 auto;

    #temperature {
      width: 85px;
      flex: 0 0 85px;
    }
  </style>
