<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealtimeIRL Combined Overlay</title>

  <style>
    :root {
      --overlay-height: 56px;
      --gap: 0px;

      --time-width: 100px;
      --date-width: 160px;
      --temp-width: 100px;
      --location-width: 320px;
      --distance-width: 140px;
      --speed-width: 140px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .overlay-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: var(--gap);
      height: var(--overlay-height);
      box-sizing: border-box;
      background: transparent;
      flex-wrap: nowrap;
      width: 100%;
      max-width: 100%;
    }

    iframe {
      display: block;
      height: var(--overlay-height);
      border: 0;
      background: transparent;
      overflow: hidden;
      flex: 0 0 auto;
    }

    #time {
      width: var(--time-width);
      flex: 0 0 var(--time-width);
    }

    #date {
      width: var(--date-width);
      flex: 0 0 var(--date-width);
    }

    #temperature {
      width: var(--temp-width);
      flex: 0 0 var(--temp-width);
    }
    
   #location {
     width: var(--location-width);
     flex: 0 0 var(--location-width);
    }

  </style>
</head>
